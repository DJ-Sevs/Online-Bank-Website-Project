<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TransacNow Register</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='register.css') }}">
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='images/TransactNowlogo.png') }}">
</head>
<body>
<section class="container">
    <div class="bg-img"></div>
    <div class="form">
        <img src="{{ url_for('static', filename='images/TransactNow.png') }}" alt="Logo" class="logo" style="height: auto; width: 190px;">
        <h1>Create Account</h1>
        {% if message %}
            <p class="message">{{ message }}</p>
        {% endif %}
        <form method="POST" action="{{ url_for('register') }}">
            <label for="fullname">Full Name</label>
            <input type="text" id="fullname" name="fullname" required>

            <label for="password">Password</label>
            <input type="password" id="password" name="password" required>

            <label for="age">Age</label>
            <input type="number" id="age" name="age" min="1" required>

            <button type="submit">Register</button>
        </form>
        <p class="register-link">Already have an account? <a href="{{ url_for('login') }}">Login here</a></p>
    </div>
</section>
</body>
</html>
